<!DOCTYPE html>
<html>
<head>
  <title>Family Expense</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      color: white;
      padding: 15px;
      transition: background 0.5s;
    }

    h2 { text-align: center; color: cyan; text-shadow: 0 0 10px cyan; }

    .topbar { display: flex; justify-content: flex-end; }

    .logout { background: orange; padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; }

    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
      border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 0 20px cyan; }

    input, select {
      width: 100%; padding: 10px; margin-top: 10px;
      border-radius: 10px; border: none; background: black; color: cyan;
    }

    button {
      width: 100%; padding: 10px; margin-top: 10px;
      border-radius: 10px; border: none; background: linear-gradient(45deg, red, orange); color: white;
    }

    .card {
      display: flex; justify-content: space-between; padding: 10px; margin-top: 10px;
      border-radius: 10px; background: rgba(0,255,255,0.1);
    }

    .delete { color: red; cursor: pointer; }

    .hidden { display: none; }

    .blast {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pop 0.8s ease;
    }

    @keyframes pop {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="glass">
  <h2>🔐 Login</h2>
  <input id="user" placeholder="Enter Gmail ID or Email">
  <input id="pass" placeholder="Password" type="password">
  <button onclick="login()">Login</button>
  <button onclick="registerUser()">Register New User</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="topbar">
    <span id="userName"></span>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <h2>💰 Family Expense</h2>

  <div class="glass">
    <input type="date" id="date">
    <input id="amount" placeholder="Enter Amount">

    <select id="category">
      <option>Food 🍔</option>
      <option>Rent 🏠</option>
      <option>Loan/EMI 💰</option>
      <option>Petrol ⛽</option>
      <option>Grocery 🛒</option>
      <option>Snacks 🍕</option>
      <option>Festival 🎆</option>
      <option>Travel 🚗</option>
      <option>Vegetables 🥦</option>
      <option>Gas 🔥</option>
      <option>Purchase 📦</option>
      <option>Meat 🍗</option>
      <option>Travel ✈️</option>
      <option>Gifts 🎁</option>
      <option>Tea ☕</option>
      <option>Movie 🎬</option>
      <option>Function 🎉</option>
      <option>Hospital 🏥</option>
      <option>Medicine 💊</option>
      <option>Party 🎉</option>
      <option>Others 📌</option>
    </select>

    <!-- NEW: Custom category -->
    <input id="customCategory" placeholder="Enter custom category" class="hidden">

    <button onclick="addExpense()">Save Expense</button>
  </div>

  <div class="glass">
    <h3>Total: ₹<span id="total">0</span></h3>
    <!-- NEW: Download -->
    <button onclick="downloadCSV()">⬇ Download Report</button>
  </div>

  <div class="glass">
    <h3>📊 Expense List</h3>
    <div id="list"></div>
  </div>

</div>

<script>

// 🎨 15 BACKGROUNDS
function changeBackground() {
  const gradients = [
    "radial-gradient(circle at top, #0f2027, #000000)",
    "radial-gradient(circle at top, #1a2a6c, #b21f1f, #fdbb2d)",
    "radial-gradient(circle at top, #ff5f6d, #ffc371)",
    "radial-gradient(circle at top, #43cea2, #185a9d)",
    "radial-gradient(circle at top, #f7971e, #ffd200)",

    "linear-gradient(45deg,#ff0000,#ff7300)",
    "linear-gradient(45deg,#00c6ff,#0072ff)",
    "linear-gradient(45deg,#fc466b,#3f5efb)",
    "linear-gradient(45deg,#00ff87,#60efff)",
    "linear-gradient(45deg,#8360c3,#2ebf91)",

    "linear-gradient(45deg,#ff512f,#dd2476)",
    "linear-gradient(45deg,#1d4350,#a43931)",
    "linear-gradient(45deg,#00b09b,#96c93d)",
    "linear-gradient(45deg,#4568dc,#b06ab3)",
    "linear-gradient(45deg,#ff6a00,#ee0979)"
  ];

  document.body.style.background =
    gradients[Math.floor(Math.random() * gradients.length)];
}
window.onload = changeBackground;

// STORAGE
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

// LOGIN (UNCHANGED)
function login() {
  let email = document.getElementById("user").value.trim();
  let password = document.getElementById("pass").value;

  let user = users.find(u => u.email === email && u.password === password);
  if(user){
    currentUser = user.email;
    localStorage.setItem("login", currentUser);
    blast("🎉 Login Success");
    showApp();
  } else {
    alert("Invalid Email or Password");
  }
}

// REGISTER (UNCHANGED)
function registerUser() {
  let email = prompt("Enter Email ID:");
  let password = prompt("Set Password:");
  if(!email || !password) return alert("Required");

  if(users.find(u => u.email === email)) return alert("User exists");

  users.push({ email, password });
  localStorage.setItem("users", JSON.stringify(users));
  alert("Registered!");
}

// SHOW APP
function showApp() {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("userName").innerText = currentUser || localStorage.getItem("login");
  display();
}

// LOGOUT
function logout() {
  localStorage.removeItem("login");
  location.reload();
}

// 📝 Others Category Logic (NEW)
document.getElementById("category").addEventListener("change", function() {
  let custom = document.getElementById("customCategory");
  if (this.value === "Others 📌") custom.classList.remove("hidden");
  else custom.classList.add("hidden");
});

// ADD EXPENSE (only small addition)
function addExpense() {
  let date = document.getElementById("date").value;
  let amount = document.getElementById("amount").value;
  let category = document.getElementById("category").value;
  let custom = document.getElementById("customCategory").value;

  if (!date || !amount) return alert("Enter all fields");

  if (category === "Others 📌" && custom) category = custom;

  expenses.push({ date, amount: Number(amount), category, user: currentUser });
  localStorage.setItem("expenses", JSON.stringify(expenses));

  blast("💥 Added!");
  display();
}

// DISPLAY (UNCHANGED)
function display() {
  let total = 0;
  let listHTML = "";

  let userExpenses = expenses.filter(e => e.user === currentUser);

  userExpenses.forEach((e,i)=>{
    total += e.amount;
    listHTML += `
      <div class="card">
        <div>${e.date} → ₹${e.amount} - ${e.category}</div>
        <div class="delete" onclick="deleteExpense(${i})">❌</div>
      </div>`;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("list").innerHTML = listHTML;
}

// DELETE (UNCHANGED)
function deleteExpense(i) {
  expenses.splice(i,1);
  localStorage.setItem("expenses", JSON.stringify(expenses));
  display();
}

// 📥 DOWNLOAD CSV (NEW)
function downloadCSV() {
  let userExpenses = expenses.filter(e => e.user === currentUser);

  let csv = "Date,Amount,Category\n";
  userExpenses.forEach(e => {
    csv += `${e.date},${e.amount},${e.category}\n`;
  });

  let blob = new Blob([csv], { type: 'text/csv' });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "expenses.csv";
  a.click();
}

// BLAST
function blast(msg) {
  let el = document.createElement("div");
  el.className = "blast";
  el.innerText = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// AUTO LOGIN
if(localStorage.getItem("login")) {
  currentUser = localStorage.getItem("login");
  showApp();
}

</script>

</body>
</html>
