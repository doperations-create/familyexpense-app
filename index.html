<!DOCTYPE html>
<html>
<head>
  <title>Family Expense PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Calibri;
      background: linear-gradient(135deg, #000000, #0f2027);
      color: cyan;
      padding: 15px;
    }

    h2 {
      text-align: center;
      text-shadow: 0 0 10px cyan;
    }

    .box {
      border: 1px solid cyan;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px cyan;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      background: black;
      color: cyan;
      border: 1px solid cyan;
    }

    button {
      width: 100%;
      padding: 10px;
      background: red;
      color: white;
      border: none;
      margin-top: 10px;
      cursor: pointer;
      box-shadow: 0 0 10px red;
    }

    .logout {
      background: orange;
      margin-bottom: 10px;
    }

    .card {
      border: 1px solid cyan;
      margin-top: 5px;
      padding: 5px;
      border-radius: 8px;
    }

    .delete {
      float: right;
      color: red;
      cursor: pointer;
    }

    .hidden { display: none; }

    /* BLAST EFFECT */
    .blast {
      position: fixed;
      top: 50%;
      left: 50%;
      font-size: 30px;
      transform: translate(-50%, -50%);
      animation: pop 0.8s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.5); opacity: 1; }
      100% { transform: scale(1); opacity: 0; }
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h2>🔐 Login</h2>
  <input id="user" placeholder="User ID">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<button class="logout" onclick="logout()">Logout</button>

<h2 id="welcome"></h2>

<div class="box">

  <input type="date" id="date">

  <input id="amount" placeholder="Enter Amount">

  <select id="category">
    <option>Food</option>
    <option>Petrol</option>
    <option>Grocery</option>
    <option>Vegetables</option>
    <option>Gas</option>
    <option>Purchase</option>
    <option>Meat</option>
    <option>Travel</option>
    <option>Gifts</option>
    <option>Tea</option>
    <option>Others</option>
  </select>

  <button onclick="addExpense()">Save Expense</button>

</div>

<div class="box">
  <h3>Total: ₹<span id="total">0</span></h3>
</div>

<div class="box">
  <h3>📅 Day-wise</h3>
  <div id="daywise"></div>
</div>

<div class="box">
  <h3>📦 Category-wise</h3>
  <div id="categorywise"></div>
</div>

<div class="box">
  <h3>📊 Expense List</h3>
  <div id="list"></div>
</div>

</div>

<script>
let users = ["Sanoop","Suganya","Sanviya"];
let password = "SSS123";

let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

// LOGIN
function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if (users.includes(u) && p === password) {
    localStorage.setItem("login", "true");
    localStorage.setItem("user", u);
    blast("🎉 Welcome " + u + " Family!");
    showApp();
  } else {
    alert("Invalid Login");
  }
}

// LOGOUT
function logout() {
  localStorage.removeItem("login");
  location.reload();
}

// SHOW APP
function showApp() {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  let u = localStorage.getItem("user");
  document.getElementById("welcome").innerText = "👋 Welcome " + u + " Family";

  display();
}

if (localStorage.getItem("login") === "true") {
  showApp();
}

// ADD
function addExpense() {
  let date = document.getElementById("date").value;
  let amount = document.getElementById("amount").value;
  let category = document.getElementById("category").value;

  if (!date || !amount) return alert("Enter all fields");

  expenses.push({ date, amount: Number(amount), category });

  localStorage.setItem("expenses", JSON.stringify(expenses));

  blast("💥 Added!");

  document.getElementById("amount").value = "";
  document.getElementById("date").value = "";

  display();
}

// DELETE
function deleteExpense(i) {
  expenses.splice(i,1);
  localStorage.setItem("expenses", JSON.stringify(expenses));
  display();
}

// DISPLAY
function display() {
  let total = 0;
  let dayData = {};
  let catData = {};
  let listHTML = "";

  expenses.forEach((e, i) => {
    total += e.amount;

    dayData[e.date] = (dayData[e.date] || 0) + e.amount;
    catData[e.category] = (catData[e.category] || 0) + e.amount;

    listHTML += `
      <div class="card">
        ${e.date} → ₹${e.amount} - ${e.category}
        <span class="delete" onclick="deleteExpense(${i})">❌</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;

  let dayHTML = "";
  for (let d in dayData) {
    dayHTML += `<div class="card">${d} → ₹${dayData[d]}</div>`;
  }
  document.getElementById("daywise").innerHTML = dayHTML;

  let catHTML = "";
  for (let c in catData) {
    catHTML += `<div class="card">${c} → ₹${catData[c]}</div>`;
  }
  document.getElementById("categorywise").innerHTML = catHTML;

  document.getElementById("list").innerHTML = listHTML;
}

// BLAST EFFECT
function blast(msg) {
  let el = document.createElement("div");
  el.className = "blast";
  el.innerText = msg;

  document.body.appendChild(el);

  setTimeout(() => el.remove(), 800);
}
</script>

</body>
</html>
