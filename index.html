<!DOCTYPE html>
<html>
<head>
  <title>Family Expense PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at top, #0f2027, #000000);
      color: white;
      padding: 15px;
    }

    h2 {
      text-align: center;
      color: cyan;
      text-shadow: 0 0 10px cyan, 0 0 20px cyan;
    }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 0 20px rgba(0,255,255,0.2);
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: black;
      color: cyan;
      box-shadow: 0 0 10px cyan inset;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(45deg, red, orange);
      color: white;
      font-weight: bold;
      box-shadow: 0 0 15px red;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .card {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      background: rgba(0,255,255,0.1);
      box-shadow: 0 0 10px cyan;
    }

    .delete {
      color: red;
      cursor: pointer;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }

    .total {
      font-size: 20px;
      text-align: center;
      color: lime;
      text-shadow: 0 0 10px lime;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="glass">
  <h2>🔐 Login</h2>
  <input id="user" placeholder="User ID">
  <input id="pass" placeholder="Password" type="password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<h2>💰 Family Expense PRO</h2>

<div class="glass">
  <input id="amount" placeholder="Enter Amount">

  <select id="category">
    <option>Food 🍔</option>
    <option>Petrol ⛽</option>
    <option>Grocery 🛒</option>
    <option>Vegetables 🥦</option>
    <option>Gas 🔥</option>
    <option>Purchase 📦</option>
    <option>Meat 🍗</option>
    <option>Travel ✈️</option>
    <option>Gifts 🎁</option>
    <option>Tea ☕</option>
    <option>Others 📌</option>
  </select>

  <button onclick="addExpense()">Save Expense</button>
</div>

<div class="glass total">
  Total: ₹<span id="total">0</span>
</div>

<div class="glass">
  <h3>📊 Expense List</h3>
  <div id="list"></div>
</div>

</div>

<script>
let users = ["Sanoop","Suganya","Sanviya"];
let password = "SSS123";

let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

// LOGIN
function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if (users.includes(u) && p === password) {
    localStorage.setItem("login", "true");
    showApp();
  } else {
    alert("Invalid Login");
  }
}

// SHOW APP
function showApp() {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  display();
}

// AUTO LOGIN
if (localStorage.getItem("login") === "true") {
  showApp();
}

// ADD
function addExpense() {
  let amount = document.getElementById("amount").value;
  let category = document.getElementById("category").value;

  if (!amount) return alert("Enter amount");

  expenses.push({
    amount: Number(amount),
    category,
    date: new Date().toLocaleDateString()
  });

  localStorage.setItem("expenses", JSON.stringify(expenses));
  document.getElementById("amount").value = "";
  display();
}

// DELETE
function deleteExpense(i) {
  expenses.splice(i,1);
  localStorage.setItem("expenses", JSON.stringify(expenses));
  display();
}

// DISPLAY
function display() {
  let total = 0;
  let html = "";

  expenses.forEach((e,i)=>{
    total += e.amount;

    html += `
      <div class="card">
        <div>₹${e.amount} - ${e.category}</div>
        <div class="delete" onclick="deleteExpense(${i})">❌</div>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("list").innerHTML = html;
}
</script>

</body>
</html>
