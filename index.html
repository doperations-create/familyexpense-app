<!DOCTYPE html>
<html>
<head>
  <title>Family Expense PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle, #000000, #0f2027);
      color: white;
      padding: 15px;
    }

    h2 {
      text-align: center;
      color: cyan;
      text-shadow: 0 0 10px cyan;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 15px;
      box-shadow: 0 0 15px cyan;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: black;
      color: cyan;
      box-shadow: 0 0 10px cyan inset;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: red;
      color: white;
      box-shadow: 0 0 10px red;
      cursor: pointer;
    }

    .card {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0,255,255,0.1);
      box-shadow: 0 0 10px cyan;
    }

    .delete {
      float: right;
      color: red;
      cursor: pointer;
    }

    .hidden { display: none; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h2>🔐 Login</h2>
  <input id="user" placeholder="User ID">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<h2>💰 Family Expense PRO</h2>

<div class="box">

  <input type="date" id="date">

  <input id="amount" placeholder="Amount">

  <select id="category">
    <option>Food 🍔</option>
    <option>Petrol ⛽</option>
    <option>Grocery 🛒</option>
    <option>Vegetables 🥦</option>
    <option>Gas 🔥</option>
    <option>Purchase 📦</option>
    <option>Meat 🍗</option>
    <option>Travel ✈️</option>
    <option>Gifts 🎁</option>
    <option>Tea ☕</option>
    <option>Others 📌</option>
  </select>

  <button onclick="addExpense()">Save Expense</button>
</div>

<div class="box">
  <h3>Total: ₹<span id="total">0</span></h3>
</div>

<div class="box">
  <h3>📅 Day-wise</h3>
  <div id="daywise"></div>
</div>

<div class="box">
  <h3>📦 Category-wise</h3>
  <div id="categorywise"></div>
</div>

<div class="box">
  <h3>📊 Expense List</h3>
  <div id="list"></div>
</div>

</div>

<script>
let users = ["Sanoop","Suganya","Sanviya"];
let password = "SSS123";

let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

// LOGIN
function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if (users.includes(u) && p === password) {
    localStorage.setItem("login", "true");
    showApp();
  } else {
    alert("Invalid Login");
  }
}

// SHOW APP
function showApp() {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  display();
}

if (localStorage.getItem("login") === "true") {
  showApp();
}

// ADD
function addExpense() {
  let amount = document.getElementById("amount").value;
  let category = document.getElementById("category").value;
  let date = document.getElementById("date").value;

  if (!amount || !date) return alert("Enter all fields");

  expenses.push({
    amount: Number(amount),
    category,
    date
  });

  localStorage.setItem("expenses", JSON.stringify(expenses));
  display();
}

// DELETE
function deleteExpense(i) {
  expenses.splice(i,1);
  localStorage.setItem("expenses", JSON.stringify(expenses));
  display();
}

// DISPLAY
function display() {
  let total = 0;
  let dayData = {};
  let catData = {};
  let listHTML = "";

  expenses.forEach((e,i)=>{
    total += e.amount;

    dayData[e.date] = (dayData[e.date] || 0) + e.amount;
    catData[e.category] = (catData[e.category] || 0) + e.amount;

    listHTML += `
      <div class="card">
        ₹${e.amount} - ${e.category} (${e.date})
        <span class="delete" onclick="deleteExpense(${i})">❌</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;

  let dayHTML = "";
  for (let d in dayData) {
    dayHTML += `<div class="card">📅 ${d} → ₹${dayData[d]}</div>`;
  }
  document.getElementById("daywise").innerHTML = dayHTML;

  let catHTML = "";
  for (let c in catData) {
    catHTML += `<div class="card">📦 ${c} → ₹${catData[c]}</div>`;
  }
  document.getElementById("categorywise").innerHTML = catHTML;

  document.getElementById("list").innerHTML = listHTML;
}
</script>

</body>
</html>
