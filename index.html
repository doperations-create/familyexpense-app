<!DOCTYPE html>
<html>
<head>
  <title>Family Expense Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background: black;
      color: white;
      padding: 20px;
    }

    h2 {
      color: #00f7ff;
      text-shadow: 0 0 10px #00f7ff;
    }

    input, select {
      padding: 10px;
      width: 90%;
      margin-bottom: 10px;
      background: black;
      color: white;
      border: 1px solid #00f7ff;
    }

    button {
      padding: 10px;
      background: red;
      color: white;
      border: none;
      box-shadow: 0 0 10px red;
    }

    .card {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #00f7ff;
      box-shadow: 0 0 10px #00f7ff;
    }
  </style>
</head>

<body>

<h2>💰 Family Expense PRO</h2>

<input id="amount" placeholder="Amount">

<select id="category">
  <option>Food</option>
  <option>Petrol</option>
  <option>Grocery</option>
  <option>Vegetables</option>
  <option>Gas</option>
  <option>Purchase</option>
  <option>Meat</option>
  <option>Travel</option>
  <option>Gifts</option>
  <option>Tea</option>
  <option>Others</option>
</select>

<button onclick="addExpense()">Save</button>

<h3>📊 Total: ₹<span id="total">0</span></h3>

<h3>📅 Day-wise</h3>
<div id="daywise"></div>

<h3>📦 Category-wise</h3>
<div id="categorywise"></div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

function addExpense() {
  let amount = document.getElementById("amount").value;
  let category = document.getElementById("category").value;
  let date = new Date().toLocaleDateString();

  if (!amount) return alert("Enter amount");

  expenses.push({ amount: Number(amount), category, date });

  localStorage.setItem("expenses", JSON.stringify(expenses));

  document.getElementById("amount").value = "";

  display();
}

function display() {
  let total = 0;
  let dayData = {};
  let catData = {};

  expenses.forEach(e => {
    total += e.amount;

    dayData[e.date] = (dayData[e.date] || 0) + e.amount;
    catData[e.category] = (catData[e.category] || 0) + e.amount;
  });

  document.getElementById("total").innerText = total;

  let dayHTML = "";
  for (let d in dayData) {
    dayHTML += `<div class="card">📅 ${d} → ₹${dayData[d]}</div>`;
  }
  document.getElementById("daywise").innerHTML = dayHTML;

  let catHTML = "";
  for (let c in catData) {
    catHTML += `<div class="card">📦 ${c} → ₹${catData[c]}</div>`;
  }
  document.getElementById("categorywise").innerHTML = catHTML;
}

display();
</script>

</body>
</html>
