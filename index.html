<!DOCTYPE html>
<html>
<head>
  <title>Family Expense</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      color: white;
      padding: 15px;
      transition: background 0.5s;
    }

    h2 { text-align: center; color: cyan; text-shadow: 0 0 10px cyan, 0 0 20px cyan; }

    .topbar { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 10px; }

    .logout { background: orange; padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; margin-left: 10px; }

    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 0 20px rgba(0,255,255,0.2); }

    input, select { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: none; background: black; color: cyan; box-shadow: 0 0 10px cyan inset; }

    button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: none; background: linear-gradient(45deg, red, orange); color: white; font-weight: bold; box-shadow: 0 0 15px red; cursor: pointer; }

    .card { display: flex; justify-content: space-between; padding: 10px; margin-top: 10px; border-radius: 10px; background: rgba(0,255,255,0.1); box-shadow: 0 0 10px cyan; }

    .delete { color: red; cursor: pointer; font-weight: bold; }

    .hidden { display: none; }

    /* Blast animation */
    .blast {
      position: fixed; top: 50%; left: 50%; font-size: 28px;
      transform: translate(-50%, -50%);
      animation: pop 0.8s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.5); opacity: 1; }
      100% { transform: scale(1); opacity: 0; }
    }

    #userPic { width: 32px; height: 32px; border-radius: 50%; margin-right: 10px; display: none; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="glass">
  <h2>🔐 Login</h2>
  <input id="user" placeholder="Enter Gmail ID or Email">
  <input id="pass" placeholder="Password" type="password">
  <button onclick="login()">Login</button>
  <button onclick="registerUser()">Register New User</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="topbar">
    <span id="userName"></span>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <h2>💰 Family Expense</h2>

  <div class="glass">
    <input type="date" id="date">
    <input id="amount" placeholder="Enter Amount">
    <select id="category">
      <option>Food 🍔</option>
      <option>Rent 🏠</option>
      <option>Loan/EMI 💰</option>
      <option>Petrol ⛽</option>
      <option>Grocery 🛒</option>
      <option>Snacks 🍕</option>
      <option>Festival 🎆</option>
      <option>Travel 🚗</option>
      <option>Vegetables 🥦</option>
      <option>Gas 🔥</option>
      <option>Purchase 📦</option>
      <option>Meat 🍗</option>
      <option>Travel ✈️</option>
      <option>Gifts 🎁</option>
      <option>Tea ☕</option>
      <option>Movie 🎬</option>
      <option>Function 🎉</option>
      <option>Hospital 🏥</option>
      <option>Medicine 💊</option>
      <option>Party 🎉</option>
      <option>Others 📌</option>
    </select>
    <button onclick="addExpense()">Save Expense</button>
  </div>

  <div class="glass">
    <h3>Total: ₹<span id="total">0</span></h3>
  </div>

  <div class="glass">
    <h3>📅 Day-wise</h3>
    <div id="daywise"></div>
  </div>

  <div class="glass">
    <h3>🗓 Month-wise</h3>
    <div id="monthwise"></div>
  </div>

  <div class="glass">
    <h3>📦 Category-wise</h3>
    <div id="categorywise"></div>
  </div>

  <div class="glass">
    <h3>📊 Expense List</h3>
    <div id="list"></div>
  </div>

</div>

<script>
// RANDOM BACKGROUND
function changeBackground() {
  const gradients = [
    "radial-gradient(circle at top, #0f2027, #000000)",
    "radial-gradient(circle at top, #1a2a6c, #b21f1f, #fdbb2d)",
    "radial-gradient(circle at top, #ff5f6d, #ffc371)",
    "radial-gradient(circle at top, #43cea2, #185a9d)",
    "radial-gradient(circle at top, #f7971e, #ffd200)"
  ];
  const bg = gradients[Math.floor(Math.random() * gradients.length)];
  document.body.style.background = bg;
}
window.onload = changeBackground;

// USERS STORAGE
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

// LOGIN
function login() {
  let email = document.getElementById("user").value.trim();
  let password = document.getElementById("pass").value;

  let user = users.find(u => u.email === email && u.password === password);
  if(user){
    currentUser = user.email;
    localStorage.setItem("login", currentUser);
    blast("🎉 Login Success");
    showApp();
  } else {
    alert("Invalid Email or Password");
  }
}

// REGISTER NEW USER
function registerUser() {
  let email = prompt("Enter Email ID for new user:");
  let password = prompt("Set Password:");
  if(!email || !password) return alert("Both Email and Password required");
  if(users.find(u => u.email === email)) return alert("User already exists");

  users.push({ email, password });
  localStorage.setItem("users", JSON.stringify(users));
  alert("User Registered! You can now login.");
}

// SHOW APP
function showApp() {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("userName").innerText = currentUser || localStorage.getItem("login");
  display();
}

// LOGOUT
function logout() {
  localStorage.removeItem("login");
  currentUser = null;
  location.reload();
}

// ADD EXPENSE
function addExpense() {
  let date = document.getElementById("date").value;
  let amount = document.getElementById("amount").value;
  let category = document.getElementById("category").value;

  if (!date || !amount) return alert("Enter all fields");

  expenses.push({ date, amount: Number(amount), category, user: currentUser });
  localStorage.setItem("expenses", JSON.stringify(expenses));

  blast("💥 Added!");
  document.getElementById("amount").value = "";
  document.getElementById("date").value = "";

  display();
}

// DELETE EXPENSE
function deleteExpense(i) {
  expenses.splice(i,1);
  localStorage.setItem("expenses", JSON.stringify(expenses));
  display();
}

// DISPLAY EXPENSES
function display() {
  let total = 0;
  let dayData = {};
  let monthData = {};
  let catData = {};
  let listHTML = "";

  // Filter expenses for current user
  let userExpenses = expenses.filter(e => e.user === currentUser);

  userExpenses.forEach((e,i)=>{
    total += e.amount;
    dayData[e.date] = (dayData[e.date] || 0) + e.amount;
    let month = e.date.slice(0,7);
    monthData[month] = (monthData[month] || 0) + e.amount;
    catData[e.category] = (catData[e.category] || 0) + e.amount;

    listHTML += `
      <div class="card">
        <div>${e.date} → ₹${e.amount} - ${e.category}</div>
        <div class="delete" onclick="deleteExpense(${i})">❌</div>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;

  // Day-wise
  let dayHTML = "";
  for (let d in dayData) dayHTML += `<div class="card">📅 ${d} → ₹${dayData[d]}</div>`;
  document.getElementById("daywise").innerHTML = dayHTML;

  // Month-wise
  let monthHTML = "";
  for (let m in monthData) monthHTML += `<div class="card">🗓 ${m} → ₹${monthData[m]}</div>`;
  document.getElementById("monthwise").innerHTML = monthHTML;

  // Category-wise
  let catHTML = "";
  for (let c in catData) catHTML += `<div class="card">📦 ${c} → ₹${catData[c]}</div>`;
  document.getElementById("categorywise").innerHTML = catHTML;

  document.getElementById("list").innerHTML = listHTML;
}

// BLAST ANIMATION
function blast(msg) {
  let el = document.createElement("div");
  el.className = "blast";
  el.innerText = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// Auto-login if stored
if(localStorage.getItem("login")) {
  currentUser = localStorage.getItem("login");
  showApp();
}
</script>

</body>
</html>
